pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

def flutterSdkPath = {
    def properties = new Properties()
    def localProperties = file("local.properties")
    if (localProperties.exists()) {
        localProperties.withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath != null) {
            return flutterSdkPath
        }
    }
    // Fallback: try to find Flutter SDK from environment
    def envFlutter = System.getenv("FLUTTER_ROOT")
    if (envFlutter != null) {
        return envFlutter
    }
    // Fallback: try common paths
    def commonPaths = [
        "C:/\flutter",
        "C:/\src\flutter",
        "D:/\flutter",
        "C:/\Users/\${System.getProperty("user.name")}/\flutter",
        "C:/\Users/\${System.getProperty("user.name")}/\Documents/\flutter",
        "C:/\Users/\${System.getProperty("user.name")}/\Downloads/\flutter",
        "/Users/\${System.getProperty("user.name")}/flutter",
        "/Users/\${System.getProperty("user.name")}/development/flutter",
        "/opt/flutter",
        "/usr/local/flutter"
    ]
    for (path in commonPaths) {
        def f = new File(path)
        if (f.exists()) {
            return path
        }
    }
    throw new GradleException("Flutter SDK not found. Please create local.properties with flutter.sdk path, or set FLUTTER_ROOT environment variable.")
}()

includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.7.2" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
}

include ":app"
